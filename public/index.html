<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Cartas - E-Commerce</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .search-bar {
            flex: 1;
            min-width: 250px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .search-bar button {
            padding: 12px 18px;
            border: none;
            border-radius: 25px;
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .search-bar button:hover {
            background: #ff4b4b;
        }

        .cart-icon {
            position: relative;
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 60px;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .card-rarity {
            display: inline-block;
            padding: 4px 10px;
            background-color: #e8d4f1;
            color: #6b4c9a;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 12px;
            width: fit-content;
        }

        .card-description {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }

        .card-price {
            font-size: 20px;
            font-weight: 700;
            color: #27ae60;
        }

        .card-stats {
            display: flex;
            gap: 8px;
            font-size: 12px;
            color: #999;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .cart-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .save-cart-btn {
            padding: 10px 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: background 0.2s;
        }

        .save-cart-btn:hover {
            background: #229954;
        }

        .saved-carts-section {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .saved-carts-section h3 {
            color: white;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .saved-carts-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .saved-cart-item {
            background: white;
            padding: 10px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .saved-cart-item button {
            padding: 5px 10px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }

        .load-cart-btn {
            background: #3498db;
            color: white;
        }

        .delete-cart-btn {
            background: #e74c3c;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .cancel-btn {
            background: #95a5a6;
            color: white;
        }

        .confirm-btn {
            background: #27ae60;
            color: white;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 32px;
            }

            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .catalog-header {
                flex-direction: column;
            }

            .search-bar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎴 Catálogo de Cartas</h1>
            <p>Descubre y compra tus cartas favoritas</p>
        </header>

        <div class="catalog-header">
            <div class="search-bar">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="🔍 Buscar por nombre, descripción o habilidades..."
                >
                <button id="searchButton" type="button">Buscar</button>
            </div>
            <div class="cart-section">
                <button class="save-cart-btn" id="saveCartBtn">💾 Guardar Carrito</button>
                <div class="cart-icon" id="cartIcon">
                    🛒
                    <div class="cart-count" id="cartCount">0</div>
                </div>
            </div>
        </div>

        <div class="cards-grid" id="cardsGrid"></div>

        <div class="no-results" id="noResults" style="display: none;">
            No se encontraron cartas que coincidan con tu búsqueda.
        </div>

        <div class="saved-carts-section">
            <h3>🗂️ Mis Carritos Guardados</h3>
            <div class="saved-carts-list" id="savedCartsList">
                <!-- Carritos guardados se cargarán aquí -->
            </div>
        </div>
    </div>

    <!-- Modal de detalle -->
    <iframe 
        id="cardDetailFrame" 
        src="card-detail.html" 
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1000;"
    ></iframe>

    <!-- Modal para guardar carrito -->
    <div class="modal" id="saveCartModal">
        <div class="modal-content">
            <h3>Guardar Carrito</h3>
            <input type="text" id="cartNameInput" placeholder="Nombre del carrito" maxlength="50">
            <div class="modal-buttons">
                <button class="cancel-btn" id="cancelSaveBtn">Cancelar</button>
                <button class="confirm-btn" id="confirmSaveBtn">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script>
        async function fetchCards(searchTerm = '') {
            const query = searchTerm.trim() ? `?q=${encodeURIComponent(searchTerm.trim())}` : '';
            const response = await fetch(`/api/cards${query}`);
            if (!response.ok) {
                console.error('Error cargando cartas:', response.statusText);
                return [];
            }
            return response.json();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            const searchButton = document.getElementById('searchButton');
            const noResults = document.getElementById('noResults');
            const saveCartBtn = document.getElementById('saveCartBtn');
            const saveCartModal = document.getElementById('saveCartModal');
            const cartNameInput = document.getElementById('cartNameInput');
            const cancelSaveBtn = document.getElementById('cancelSaveBtn');
            const confirmSaveBtn = document.getElementById('confirmSaveBtn');
            const savedCartsList = document.getElementById('savedCartsList');

            function updateNoResults(term, cards) {
                noResults.style.display = term && cards.length === 0 ? 'block' : 'none';
            }

            async function loadCards(term = '') {
                const cards = await fetchCards(term);
                renderCardsGrid(cards);
                updateNoResults(term, cards);
            }

            async function applyTextSearch() {
                const term = searchInput.value;
                await loadCards(term);
            }

            searchInput.addEventListener('input', applyTextSearch);
            searchButton.addEventListener('click', applyTextSearch);

            loadCards();

            updateCartCount();
            loadSavedCarts();
            window.addEventListener('cartUpdated', () => {
                updateCartCount();
                saveCurrentCart();
            });

            // Event listeners para guardar carrito
            saveCartBtn.addEventListener('click', () => {
                const cart = getCurrentCart();
                if (cart.length === 0) {
                    alert('Tu carrito está vacío. Agrega productos antes de guardar.');
                    return;
                }
                saveCartModal.classList.add('show');
                cartNameInput.focus();
            });

            cancelSaveBtn.addEventListener('click', () => {
                saveCartModal.classList.remove('show');
                cartNameInput.value = '';
            });

            confirmSaveBtn.addEventListener('click', () => {
                const name = cartNameInput.value.trim();
                if (!name) {
                    alert('Por favor ingresa un nombre para el carrito.');
                    return;
                }
                saveCart(name);
                saveCartModal.classList.remove('show');
                cartNameInput.value = '';
                loadSavedCarts();
            });

            document.getElementById('cartIcon').addEventListener('click', () => {
                const cart = getCurrentCart();
                alert('Carrito actual: ' + JSON.stringify(cart, null, 2));
            });
        });

        function getCurrentCart() {
            return JSON.parse(localStorage.getItem('cart') || '[]');
        }

        function saveCurrentCart() {
            const cart = getCurrentCart();
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function saveCart(name) {
            const cart = getCurrentCart();
            const savedCarts = JSON.parse(localStorage.getItem('saved_carts') || '[]');
            
            // Verificar si ya existe un carrito con ese nombre
            const existingIndex = savedCarts.findIndex(c => c.name === name);
            const cartData = {
                name: name,
                items: [...cart],
                date: new Date().toISOString()
            };
            
            if (existingIndex >= 0) {
                savedCarts[existingIndex] = cartData;
            } else {
                savedCarts.push(cartData);
            }
            
            localStorage.setItem('saved_carts', JSON.stringify(savedCarts));
            alert(`Carrito "${name}" guardado exitosamente.`);
        }

        function loadSavedCarts() {
            const savedCarts = JSON.parse(localStorage.getItem('saved_carts') || '[]');
            const savedCartsList = document.getElementById('savedCartsList');
            savedCartsList.innerHTML = '';

            if (savedCarts.length === 0) {
                savedCartsList.innerHTML = '<p style="color: white; font-style: italic;">No tienes carritos guardados aún.</p>';
                return;
            }

            savedCarts.forEach((cart, index) => {
                const cartItem = document.createElement('div');
                cartItem.className = 'saved-cart-item';
                cartItem.innerHTML = `
                    <span>${cart.name} (${cart.items.length} items - ${new Date(cart.date).toLocaleDateString()})</span>
                    <button class="load-cart-btn" onclick="loadCart(${index})">Cargar</button>
                    <button class="delete-cart-btn" onclick="deleteCart(${index})">Eliminar</button>
                `;
                savedCartsList.appendChild(cartItem);
            });
        }

        function loadCart(index) {
            const savedCarts = JSON.parse(localStorage.getItem('saved_carts') || '[]');
            if (savedCarts[index]) {
                localStorage.setItem('cart', JSON.stringify(savedCarts[index].items));
                updateCartCount();
                alert(`Carrito "${savedCarts[index].name}" cargado exitosamente.`);
                window.dispatchEvent(new CustomEvent('cartUpdated'));
            }
        }

        function deleteCart(index) {
            const savedCarts = JSON.parse(localStorage.getItem('saved_carts') || '[]');
            const deletedName = savedCarts[index].name;
            savedCarts.splice(index, 1);
            localStorage.setItem('saved_carts', JSON.stringify(savedCarts));
            loadSavedCarts();
            alert(`Carrito "${deletedName}" eliminado.`);
        }

        function updateCartCount() {
            const cart = getCurrentCart();
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }
    </script>
</body>
</html>
