<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Cartas - E-Commerce</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .search-bar {
            flex: 1;
            min-width: 250px;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .cart-icon {
            position: relative;
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 60px;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .card-rarity {
            display: inline-block;
            padding: 4px 10px;
            background-color: #e8d4f1;
            color: #6b4c9a;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 12px;
            width: fit-content;
        }

        .card-description {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }

        .card-price {
            font-size: 20px;
            font-weight: 700;
            color: #27ae60;
        }

        .card-stats {
            display: flex;
            gap: 8px;
            font-size: 12px;
            color: #999;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: white;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 32px;
            }

            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .catalog-header {
                flex-direction: column;
            }

            .search-bar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎴 Catálogo de Cartas</h1>
            <p>Descubre y compra tus cartas favoritas</p>
        </header>

        <div class="catalog-header">
            <div class="search-bar">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="🔍 Buscar cartas por nombre..."
                >
            </div>
            <div class="cart-icon" id="cartIcon">
                🛒
                <div class="cart-count" id="cartCount">0</div>
            </div>
        </div>

        <div class="cards-grid" id="cardsGrid"></div>

        <div class="no-results" id="noResults" style="display: none;">
            No se encontraron cartas que coincidan con tu búsqueda.
        </div>
    </div>

    <!-- Modal de detalle -->
    <iframe 
        id="cardDetailFrame" 
        src="card-detail.html" 
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1000;"
    ></iframe>

    <!-- Scripts -->
    <script src="cards-data.js"></script>
    <script src="app.js"></script>
    <script>
        // Inicializar catálogo al cargar
        document.addEventListener('DOMContentLoaded', () => {
            renderCardsGrid(cardsData);
            updateCartCount();

            // Buscar cartas
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const filtered = cardsData.filter(card => 
                    card.name.toLowerCase().includes(e.target.value.toLowerCase())
                );
                renderCardsGrid(filtered);
            });

            // Escuchar actualización del carrito
            window.addEventListener('cartUpdated', updateCartCount);

            // Click en icono del carrito
            document.getElementById('cartIcon').addEventListener('click', () => {
                alert('Carrito: ' + JSON.stringify(JSON.parse(localStorage.getItem('cart') || '[]'), null, 2));
            });
        });

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }
    </script>
</body>
</html>
